apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: laguna-s-2-1-q4km
  namespace: inference
spec:
  modelName: laguna-s-2-1-q4km
  backend: llamacpp-laguna
  # DFlash speculative decoding: draft model is co-located with main model
  # The controller doesn't have $(DRAFT_SOURCE), so we use the model directory path
  args:
    - -md
    - /models/laguna-s-2-1-q4km/laguna-s-2.1-DFlash-BF16.gguf
    - --spec-type
    - draft-dflash
    - --spec-draft-n-max
    - "15"
  source:
    huggingFace:
      repo: poolside/Laguna-S-2.1-GGUF
      contextSize: "32768"
      modelFile: laguna-s-2.1-Q4_K_M.gguf
      files:
        - laguna-s-2.1-Q4_K_M.gguf
        - laguna-s-2.1-DFlash-BF16.gguf
      tokenSecret: hf-token
      tokenSecretKey: token
  storage:
    pvc: model-cache
    modelDir: laguna-s-2-1-q4km
  resources:
    memory: 80Gi
    memoryLimit: 110Gi
  scaling:
    cooldownPeriod: 15m
    maxReplicas: 1
    enabled: true
    evictionPolicy: MemoryPressureOnly
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
  service:
    type: ClusterIP
