apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: deepseek-r1-0528-ik
  namespace: inference
spec:
  backend: ik-llama-cpu
  modelName: deepseek-r1-0528-ik
  nodeSelector:
    kubernetes.io/hostname: shadow
  resources:
    memory: 30Gi
    memoryLimit: 125Gi
  env:
    # --cpu-moe keeps MoE expert weights on CPU via mmap
    - name: LLAMA_ARG_CPU_MOE
      value: "1"
    # Reduce context to minimize KV cache memory pressure
    - name: LLAMA_ARG_CTX_SIZE
      value: "4096"
    # Disable flash attention to bypass FlashMLA — suspected cause of
    # NaN logits on DeepSeek2 architecture with Q2_K over mmap
    - name: LLAMA_ARG_FLASH_ATTN
      value: "0"
    # f16 KV cache required when flash attention is disabled
    - name: LLAMA_ARG_CACHE_TYPE_K
      value: f16
    - name: LLAMA_ARG_CACHE_TYPE_V
      value: f16
  scaling:
    cooldownPeriod: 30m
    enabled: true
    evictionPolicy: Default
    maxReplicas: 1
  service:
    type: ClusterIP
  source:
    huggingFace:
      contextSize: "4096"
      files:
      - 'Q2_K/*'
      modelFile: Q2_K/DeepSeek-R1-0528-Q2_K-00001-of-00005.gguf
      repo: unsloth/DeepSeek-R1-0528-GGUF
      tokenSecret: hf-token
      tokenSecretKey: token
  storage:
    modelDir: deepseek-r1-0528
    pvc: model-cache
  tolerations:
  - key: amd.com/gpu
    operator: Exists
