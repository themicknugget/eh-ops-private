apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: qwen3-235b-a22b-q4km
  namespace: inference
spec:
  backend: llamacpp-vulkan-moe-flash-cpumoe
  modelName: qwen3-235b-a22b-q4km
  nodeSelector:
    kubernetes.io/hostname: shadow
  resources:
    memory: 30Gi
    memoryLimit: 110Gi
  env:
  - name: LLAMA_FLASH_MOE_METRICS_PORT
    value: "9090"
  # Disable flash-moe: standard CPU→GPU path with slot buffer is faster
  - name: LLAMA_FLASH_MOE_ENABLED
    value: "0"
  - name: LLAMA_FLASH_MOE_MODE
    value: "disabled"
  - name: LLAMA_FLASH_MOE_IOURING
    value: "0"
  - name: GGML_MOE_N_SLOTS
    value: "64"

  scaling:
    cooldownPeriod: 30m
    enabled: true
    evictionPolicy: Default
    maxReplicas: 1
  service:
    type: ClusterIP
  source:
    huggingFace:
      contextSize: "8192"
      files:
      - 'Q4_K_M/*'
      modelFile: Q4_K_M/Qwen3-235B-A22B-Q4_K_M-00001-of-00003.gguf
      repo: unsloth/Qwen3-235B-A22B-GGUF
      tokenSecret: hf-token
      tokenSecretKey: token
  storage:
    modelDir: qwen3-235b-a22b-q4km
    pvc: model-cache
  tolerations:
  - key: amd.com/gpu
    operator: Exists
