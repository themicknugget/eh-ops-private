apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: manager-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: inference-budget-controller
    app.kubernetes.io/part-of: inference-budget-controller
    app.kubernetes.io/managed-by: kustomize
  name: manager-role
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [endpoints]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  - apiGroups: [inference.eh-ops.io]
    resources: [inferencemodels]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [inference.eh-ops.io]
    resources: [inferencemodels/finalizers]
    verbs: [update]
  - apiGroups: [inference.eh-ops.io]
    resources: [inferencemodels/status]
    verbs: [get, patch, update]
  - apiGroups: [inference.eh-ops.io]
    resources: [inferencebackends]
    verbs: [get, list, watch]
  - apiGroups: [inference.eh-ops.io]
    resources: [inferencebackends/status]
    verbs: [get]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create, get, list, update, watch]
  - apiGroups: [metrics.k8s.io]
    resources: [pods]
    verbs: [get, list]
  - apiGroups: [gateway.networking.k8s.io]
    resources: [httproutes]
    verbs: [create, delete, get, list, patch, update, watch]
