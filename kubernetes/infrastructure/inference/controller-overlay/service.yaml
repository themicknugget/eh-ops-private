apiVersion: v1
kind: Service
metadata:
  name: controller-manager
  namespace: inference
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: inference-budget-controller
    app.kubernetes.io/component: manager
spec:
  type: ClusterIP
  ports:
    - name: proxy
      port: 9000
      targetPort: 9000
    - name: metrics
      port: 8080
      targetPort: 8080
  selector:
    control-plane: controller-manager
