apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: laguna-s-2-1-q4km
  namespace: inference
spec:
  modelName: laguna-s-2-1-q4km
  backend: llamacpp-vulkan-laguna
  args:
    - --ctx-size
    - "65536"
  source:
    huggingFace:
      repo: poolside/Laguna-S-2.1-GGUF
      contextSize: "65536"
      modelFile: laguna-s-2.1-Q4_K_M.gguf
      files:
        - laguna-s-2.1-Q4_K_M.gguf
      tokenSecret: hf-token
      tokenSecretKey: token
  storage:
    pvc: model-cache
    modelDir: laguna-s-2-1-q4km
  resources:
    memory: 80Gi
    memoryLimit: 110Gi
  scaling:
    cooldownPeriod: 15m
    maxReplicas: 1
    enabled: true
    evictionPolicy: MemoryPressureOnly
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
  service:
    type: ClusterIP
