# DeepSeek-R1-0528 671B (MoE, 256 experts, top-8)
# Q2_K quantization - ~220 GiB, 61 MoE layers
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deepseek-r1-0528
  namespace: inference
spec:
  interval: 5m
  chart:
    spec:
      chart: ./kubernetes/infrastructure/inference/chart
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 5m
  values:
    name: deepseek-r1-0528
    backend: llamacpp-vulkan-moe-flash

    source:
      huggingface: unsloth/DeepSeek-R1-0528-GGUF
      contextSize: "8192"

    storage:
      sharedPvc: model-cache
      modelDir: deepseek-r1-0528
      modelFile: Q2_K/DeepSeek-R1-0528-Q2_K-00001-of-00005.gguf

    download:
      include: "Q2_K/*"
      tokenSecret: hf-token

    resources:
      requests:
        memory: 200Gi
        cpu: "4"
      limits:
        memory: 200Gi

    scaling:
      cooldownPeriod: 300
      maxReplicas: 1

    nodeSelector:
      kubernetes.io/hostname: shadow

    tolerations:
      - key: amd.com/gpu
        operator: Exists
