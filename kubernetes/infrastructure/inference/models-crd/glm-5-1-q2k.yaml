apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: glm-5-1-q2k
  namespace: inference
spec:
  backend: llamacpp-vulkan-moe-flash-cpumoe
  modelName: glm-5-1-q2k
  nodeSelector:
    kubernetes.io/hostname: shadow
  resources:
    memory: 30Gi
    memoryLimit: 110Gi
  env:
  - name: LLAMA_FLASH_MOE_METRICS_PORT
    value: "9090"
  - name: LLAMA_FLASH_MOE_ENABLED
    value: "0"
  - name: LLAMA_FLASH_MOE_MODE
    value: "disabled"
  - name: LLAMA_FLASH_MOE_IOURING
    value: "0"
  scaling:
    cooldownPeriod: 30m
    enabled: true
    evictionPolicy: Default
    maxReplicas: 1
  service:
    type: ClusterIP
  source:
    huggingFace:
      contextSize: "2048"
      files:
      - 'UD-Q2_K_XL/*'
      modelFile: UD-Q2_K_XL/GLM-5.1-UD-Q2_K_XL-00001-of-00007.gguf
      repo: unsloth/GLM-5.1-GGUF
      tokenSecret: hf-token
      tokenSecretKey: token
  storage:
    modelDir: glm-5-1-q2k
    pvc: model-cache
  tolerations:
  - key: amd.com/gpu
    operator: Exists
