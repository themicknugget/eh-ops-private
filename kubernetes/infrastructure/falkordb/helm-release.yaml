---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeblocks
  namespace: kb-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kubeblocks
      version: "1.0.2"
      sourceRef:
        kind: HelmRepository
        name: kubeblocks
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falkordb-addon
  namespace: kb-system
spec:
  interval: 30m
  dependsOn:
    - name: kubeblocks
  chart:
    spec:
      chart: falkordb
      version: "1.0.2"
      sourceRef:
        kind: HelmRepository
        name: kubeblocks
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
