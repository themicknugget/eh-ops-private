# One-time Job: download gemma-4-12B-it-abliterated safetensors, convert to GGUF, quantize to Q6_K.
# OpenYourMind/gemma-4-12B-it-abliterated-uncensored ships BF16 safetensors only — no GGUF upstream.
#
# Apply:   kubectl apply -f this-file -n inference
# Monitor: kubectl logs -n inference job/gemma-4-12b-abliterated-convert -f
# Result:  /models/gemma-4-12b-abliterated/gemma-4-12b-abliterated.Q6_K.gguf + .ready
apiVersion: batch/v1
kind: Job
metadata:
  name: gemma-4-12b-abliterated-convert
  namespace: inference
spec:
  ttlSecondsAfterFinished: 604800  # 7 days
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: shadow
      tolerations:
        - key: amd.com/gpu
          operator: Exists
      containers:
        - name: convert
          image: ghcr.io/ggml-org/llama.cpp:full
          command:
            - sh
            - -c
            - |
              set -e
              MODEL_DIR=/models/gemma-4-12b-abliterated
              GGUF_F16="$MODEL_DIR/gemma-4-12b-abliterated.f16.gguf"
              GGUF_OUT="$MODEL_DIR/gemma-4-12b-abliterated.Q6_K.gguf"

              if [ -f "$MODEL_DIR/.ready" ]; then
                echo "Already converted, exiting"
                exit 0
              fi

              mkdir -p "$MODEL_DIR"

              pip install --quiet --break-system-packages "huggingface_hub[cli]" hf-transfer
              export PATH="/root/.local/bin:$PATH"
              export HF_HUB_ENABLE_HF_TRANSFER=1

              echo "=== Cloning llama.cpp for latest converter (gemma4_unified support) ==="
              git clone --depth=1 https://github.com/ggerganov/llama.cpp.git /tmp/llama-cpp
              pip install --quiet --break-system-packages \
                "transformers>=4.51" \
                "gguf>=0.10" \
                numpy sentencepiece tqdm

              echo "=== Downloading safetensors (~24GB) ==="
              huggingface-cli download OpenYourMind/gemma-4-12B-it-abliterated-uncensored \
                --local-dir "$MODEL_DIR/src" \
                --token "$HF_TOKEN"

              echo "=== Patching tokenizer_config for transformers compatibility ==="
              python3 -c "import json,sys; p='$MODEL_DIR/src/tokenizer_config.json'; d=json.load(open(p)); d['extra_special_tokens']={} if isinstance(d.get('extra_special_tokens'),list) else d.get('extra_special_tokens',{}); json.dump(d,open(p,'w')); print('patched')"

              echo "=== Converting to F16 GGUF ==="
              python3 /tmp/llama-cpp/convert_hf_to_gguf.py \
                "$MODEL_DIR/src" \
                --outfile "$GGUF_F16"

              echo "=== Quantizing to Q6_K ==="
              /app/llama-quantize "$GGUF_F16" "$GGUF_OUT" Q6_K

              echo "=== Cleaning up intermediates ==="
              rm -f "$GGUF_F16"
              rm -rf "$MODEL_DIR/src"

              echo "=== Writing .manifest for controller ==="
              SIZE=$(stat -c %s "$GGUF_OUT")
              printf '{"files":{"%s":%d}}' "$(basename $GGUF_OUT)" "$SIZE" > "$MODEL_DIR/.manifest"
              echo "Manifest: $(cat $MODEL_DIR/.manifest)"

              touch "$MODEL_DIR/.ready"

              echo "=== Fixing ownership for controller (uid 65532) ==="
              chown -R 65532:65532 "$MODEL_DIR"

              echo "=== Done: $GGUF_OUT ($SIZE bytes) ==="
          env:
            - name: HF_HOME
              value: /models
            - name: HOME
              value: /root
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          resources:
            requests:
              memory: 24Gi
              cpu: "8"
            limits:
              memory: 36Gi
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
