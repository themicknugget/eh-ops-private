---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo-runners
data:
  daemon.json: |
    {
      "mtu": 1420,
      "default-network-opts": {
        "bridge": {
          "com.docker.network.driver.mtu": "1420"
        }
      }
    }
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 1
      timeout: 3h
      shutdown_timeout: 3h
      labels:
        - "ubuntu-latest:docker://catthehacker/ubuntu:act-22.04"
        - "ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04"
        - "ubuntu-20.04:docker://catthehacker/ubuntu:act-20.04"
        - "self-hosted"
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: ""
      privileged: false
      options: ""
      workdir_parent: ""
      valid_volumes:
        - "/var/run/docker.sock"
      docker_host: "unix:///var/run/docker.sock"
      force_pull: false
    host:
      workdir_parent: ""
