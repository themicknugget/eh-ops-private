apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Controller-manager deployment with cluster-specific patches
# This replaces the base deployment from inference-budget-controller

resources:
  # RBAC vendored locally (avoids remote fetch at kustomize build time)
  - rbac/
  # Local deployment with cluster-specific patches
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
