apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 1h
  chart:
    spec:
      chart: forgejo
      version: "16.2.2"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 3
  values:
    gitea:
      admin:
        existingSecret: forgejo-admin-secret
        passwordMode: keepUpdated

      config:
        APP_NAME: "Forgejo"

        server:
          DOMAIN: forgejo.whydontyou.work
          ROOT_URL: https://forgejo.whydontyou.work
          SSH_DOMAIN: forgejo.whydontyou.work
          SSH_PORT: 22
          SSH_USER: forgejo
          LFS_START_SERVER: true

        service:
          DISABLE_REGISTRATION: true

        actions:
          ENABLED: true

        lfs:
          STORAGE_TYPE: local
          PATH: /data/git/lfs

        repository:
          DEFAULT_BRANCH: main

        database:
          DB_TYPE: postgres
          HOST: forgejo-db-rw.forgejo.svc.cluster.local:5432
          NAME: app
          USER: app
          SSL_MODE: disable

      additionalConfigFromEnvs:
        - name: GITEA__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: forgejo-db-app
              key: password

    persistence:
      enabled: true
      size: 30Gi
      storageClass: nfs-client
      accessModes:
        - ReadWriteOnce

    ingress:
      enabled: false

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 22

    # Required for NFS-backed PVC — fixes permission errors on /data/git
    podSecurityContext:
      fsGroup: 1000

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
