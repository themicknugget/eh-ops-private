apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    # Stub zones for cluster-owned domains → k8s-gateway returns internal gateway IPs
    # instead of Cloudflare IPs, keeping pod-to-pod traffic off the public internet
    whydontyou.work:53 {
        errors
        cache 30
        forward . 10.105.17.248
    }
    heygolem.com:53 {
        errors
        cache 30
        forward . 10.105.17.248
    }
    codecrucible.app:53 {
        errors
        cache 30
        forward . 10.105.17.248
    }

    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        log . {
            class error
        }
        prometheus :9153

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
