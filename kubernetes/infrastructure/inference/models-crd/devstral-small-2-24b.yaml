apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: devstral-small-2-24b
  namespace: inference
spec:
  modelName: devstral-small-2-24b
  backend: llamacpp-vulkan
  source:
    huggingFace:
      repo: unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF
      contextSize: "131072"
      modelFile: Devstral-Small-2-24B-Instruct-2512-Q4_K_M.gguf
      files:
        - "*Q4_K_M.gguf"
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: devstral-small-2-24b
  resources:
    memory: 16Gi
    memoryLimit: 24Gi
  env:
    - name: LLAMA_ARG_CTX_SIZE
      value: "131072"
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
    evictionPolicy: MemoryPressureOnly
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
