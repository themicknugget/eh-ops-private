apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: inference-api-key-auth
  namespace: inference
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: inference
  apiKeyAuth:
    credentialRefs:
      - name: inference-api-key
        namespace: inference
    extractFrom:
      - headers: ["Authorization"]
      - headers: ["x-api-key"]
