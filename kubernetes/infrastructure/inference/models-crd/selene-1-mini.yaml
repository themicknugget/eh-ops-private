apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: selene-1-mini
  namespace: inference
spec:
  modelName: selene-1-mini
  backend: llamacpp-vulkan
  source:
    huggingFace:
      repo: bartowski/Selene-1-Mini-Llama-3.1-8B-GGUF
      contextSize: "65536"
      modelFile: Selene-1-Mini-Llama-3.1-8B-Q4_K_M.gguf
      files:
        - "*Q4_K_M.gguf"
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: selene-1-mini
  resources:
    memory: 6Gi
    memoryLimit: 14Gi
  env:
    - name: LLAMA_ARG_CTX_SIZE
      value: "65536"
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
    evictionPolicy: MemoryPressureOnly
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
