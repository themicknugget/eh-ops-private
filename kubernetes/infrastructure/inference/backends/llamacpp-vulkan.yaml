apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceBackend
metadata:
  name: llamacpp-vulkan
  namespace: inference
spec:
  image:
    repository: docker.io/kyuz0/amd-strix-halo-toolboxes
    tag: vulkan-radv
  port: 8080
  command:
    - /usr/bin/llama-server
  args:
    - -m
    - $(HF_SOURCE)
    - --host
    - 0.0.0.0
    - --port
    - "8080"
    - --metrics
    - --n-gpu-layers
    - all
  readinessPath: /health
  gpu:
    shared: true
  securityContext:
    capabilities:
      add:
        - SYS_PTRACE
    seccompProfile:
      type: Unconfined
  volumes:
    - name: dri
      hostPath:
        path: /dev/dri
    - name: kfd
      hostPath:
        path: /dev/kfd
  volumeMounts:
    - name: dri
      mountPath: /dev/dri
    - name: kfd
      mountPath: /dev/kfd
