apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: gemma-4-12b-abliterated
  namespace: inference
spec:
  modelName: gemma-4-12b-abliterated
  backend: llamacpp-vulkan
  source:
    huggingFace:
      repo: OpenYourMind/gemma-4-12B-it-abliterated-uncensored
      contextSize: "65536"
      modelFile: gemma-4-12b-abliterated.Q6_K.gguf
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: gemma-4-12b-abliterated
  resources:
    memory: 16Gi
    memoryLimit: 28Gi
  # Abliteration destabilized the model's channel-based chat template: at the
  # GGUF's default temp (1.0), it frequently mis-transitions out of the empty
  # thinking-channel scaffold, leaking <|channel> tokens or 500ing the jinja
  # parser. temp=0.3 tested 8/8 clean across varied prompts vs ~50% failure at 1.0.
  args:
    - --temp
    - "0.3"
  env:
    - name: LLAMA_ARG_CTX_SIZE
      value: "131072"
    - name: LLAMA_ARG_FLASH_ATTN
      value: "1"
    - name: LLAMA_ARG_CACHE_TYPE_K
      value: q4_0
    - name: LLAMA_ARG_CACHE_TYPE_V
      value: q4_0
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
