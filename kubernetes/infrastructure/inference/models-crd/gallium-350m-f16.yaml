apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: gallium-350m-f16
  namespace: inference
spec:
  modelName: gallium-350m-f16
  backend: llamacpp-vulkan
  source:
    huggingFace:
      repo: mradermacher/Gallium-350M-GGUF
      # LFM2 hybrid: only 6/16 layers are attention, so full native context is
      # cheap (~1.6GB KV at f16). Backend defaults to f16 KV — no override.
      contextSize: "128000"
      modelFile: Gallium-350M.f16.gguf
      files:
        - Gallium-350M.f16.gguf
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: gallium-350m-f16
  resources:
    # ~0.7GB weights + ~1.6GB KV at 128k + runtime headroom.
    memory: 3Gi
    memoryLimit: 6Gi
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
