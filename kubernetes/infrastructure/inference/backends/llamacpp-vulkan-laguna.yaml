apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceBackend
metadata:
  name: llamacpp-vulkan-laguna
  namespace: inference
spec:
  image:
    repository: ghcr.io/cecil-the-coder/llama-cpp-laguna-vulkan
    tag: dflash-fix-v2
  port: 8080
  command:
    - /usr/bin/llama-server
  args:
    - -m
    - $(HF_SOURCE)
    - --host
    - "0.0.0.0"
    - --port
    - "8080"
    - --metrics
    - --n-gpu-layers
    - all
    - --jinja
    - -fa
    - "on"
    - --no-warmup
    - --verbose
  readinessPath: /health
  gpu:
    shared: true
  env:
    - name: LLAMA_ARG_CACHE_TYPE_K
      value: q4_0
    - name: LLAMA_ARG_CACHE_TYPE_V
      value: q4_0
    - name: LLAMA_ARG_BATCH_SIZE
      value: "4096"
    - name: LLAMA_ARG_UBATCH_SIZE
      value: "1024"
    - name: LLAMA_ARG_THREADS
      value: "12"
  securityContext:
    capabilities:
      add:
        - SYS_PTRACE
    seccompProfile:
      type: Unconfined
  volumes:
    - name: dri
      hostPath:
        path: /dev/dri
    - name: kfd
      hostPath:
        path: /dev/kfd
  volumeMounts:
    - name: dri
      mountPath: /dev/dri
    - name: kfd
      mountPath: /dev/kfd
