apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: gemma-4-12b-abliterated
  namespace: inference
spec:
  modelName: gemma-4-12b-abliterated
  backend: llamacpp-vulkan
  source:
    huggingFace:
      repo: OpenYourMind/gemma-4-12B-it-abliterated-uncensored
      contextSize: "32768"
      modelFile: gemma-4-12b-abliterated.Q6_K.gguf
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: gemma-4-12b-abliterated
  resources:
    memory: 16Gi
    memoryLimit: 28Gi
  env:
    - name: LLAMA_ARG_CTX_SIZE
      value: "131072"
    - name: LLAMA_ARG_FLASH_ATTN
      value: "1"
    - name: LLAMA_ARG_CACHE_TYPE_K
      value: q4_0
    - name: LLAMA_ARG_CACHE_TYPE_V
      value: q4_0
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
    evictionPolicy: MemoryPressureOnly
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
