apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: mistral-small-3-2-24b
  namespace: inference
spec:
  modelName: mistral-small-3-2-24b
  backend: llamacpp-vulkan
  source:
    huggingFace:
      repo: bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF
      contextSize: "65536"
      modelFile: mistralai_Mistral-Small-3.2-24B-Instruct-2506-Q4_K_M.gguf
      files:
        - "*Q4_K_M.gguf"
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: mistral-small-3-2-24b
  resources:
    memory: 16Gi
    memoryLimit: 24Gi
  env:
    - name: LLAMA_ARG_CTX_SIZE
      value: "65536"
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
