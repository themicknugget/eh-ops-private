apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: deepseek-r1-0528
  namespace: inference
spec:
  backend: llamacpp-vulkan-moe-flash-cpumoe
  modelName: deepseek-r1-0528
  nodeSelector:
    kubernetes.io/hostname: shadow
  resources:
    memory: 30Gi
    memoryLimit: 120Gi
  env:
  - name: LLAMA_FLASH_MOE_METRICS_PORT
    value: "9090"
  # Expert GPU cache: disable flash-moe async prefetch to use standard CPU→GPU
  # copy path with cross-token expert caching (3.9 t/s vs 2.3 t/s with flash-moe)
  - name: LLAMA_FLASH_MOE_ENABLED
    value: "0"
  - name: LLAMA_FLASH_MOE_MODE
    value: "disabled"
  - name: LLAMA_FLASH_MOE_IOURING
    value: "0"

  scaling:
    cooldownPeriod: 30m
    enabled: true
    evictionPolicy: Default
    maxReplicas: 1
  service:
    type: ClusterIP
  source:
    huggingFace:
      contextSize: "8192"
      files:
      - 'Q2_K/*'
      modelFile: Q2_K/DeepSeek-R1-0528-Q2_K-00001-of-00005.gguf
      repo: unsloth/DeepSeek-R1-0528-GGUF
      tokenSecret: hf-token
      tokenSecretKey: token
  storage:
    modelDir: deepseek-r1-0528
    pvc: model-cache
  tolerations:
  - key: amd.com/gpu
    operator: Exists
