---
# On edge nodes, pods use nodelocal-dns at 169.254.20.10 (hostNetwork).
# Cilium maps 169.254.20.10 to reserved:host, so K8s NetworkPolicy ipBlock
# can never match it. A CiliumNetworkPolicy with toEntities:host is required.
# This policy generates a companion CiliumNetworkPolicy for every K8s NetworkPolicy
# that restricts Egress, using the same podSelector so only the affected pods gain
# the host:53 egress allow — unrestricted pods in the namespace are untouched.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-nodelocal-dns-egress
spec:
  generateExistingOnPolicyUpdate: true
  rules:
  - name: generate-nodelocal-dns-cnp
    match:
      any:
      - resources:
          kinds:
          - NetworkPolicy
    preconditions:
      all:
      - key: "{{ request.object.spec.policyTypes[] | contains(@, 'Egress') }}"
        operator: Equals
        value: true
    generate:
      apiVersion: cilium.io/v2
      kind: CiliumNetworkPolicy
      name: "nodelocal-dns-egress-{{ request.object.metadata.name }}"
      namespace: "{{ request.object.metadata.namespace }}"
      synchronize: true
      data:
        spec:
          endpointSelector: "{{ request.object.spec.podSelector }}"
          egress:
          - toEntities:
            - host
            toPorts:
            - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
