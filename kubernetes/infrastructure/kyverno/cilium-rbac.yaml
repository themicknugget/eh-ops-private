---
# Kyverno needs permission to manage CiliumNetworkPolicy resources to support
# generate rules that create companion CNPs for K8s NetworkPolicies.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:manage-ciliumnetworkpolicies
rules:
- apiGroups:
  - cilium.io
  resources:
  - ciliumnetworkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno:admission-controller:ciliumnetworkpolicies
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno:manage-ciliumnetworkpolicies
subjects:
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno:background-controller:ciliumnetworkpolicies
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno:manage-ciliumnetworkpolicies
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
