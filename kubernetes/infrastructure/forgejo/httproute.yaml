apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  namespace: forgejo
spec:
  parentRefs:
    - name: external-gateway
      namespace: kube-system
      sectionName: https-domain1
  hostnames:
    - "forgejo.${DOMAIN1}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: forgejo-http
          port: 3000
---
# Redirect HTTP to HTTPS so the client-side URL check always passes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo-http-redirect
  namespace: forgejo
spec:
  parentRefs:
    - name: external-gateway
      namespace: kube-system
      sectionName: http-domain1
  hostnames:
    - "forgejo.${DOMAIN1}"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
