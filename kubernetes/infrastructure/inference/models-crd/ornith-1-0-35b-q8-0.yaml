apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: ornith-1-0-35b-q8-0
  namespace: inference
spec:
  modelName: ornith-1-0-35b-q8-0
  backend: llamacpp-vulkan-moe
  source:
    huggingFace:
      repo: deepreinforce-ai/Ornith-1.0-35B-GGUF
      contextSize: "65536"
      modelFile: ornith-1.0-35b-Q8_0.gguf
      files:
        - ornith-1.0-35b-Q8_0.gguf
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: ornith-1-0-35b-q8-0
  resources:
    memory: 42Gi
    memoryLimit: 55Gi
  env:
    - name: LLAMA_ARG_CTX_SIZE
      value: "65536"
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
