apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: axonhub-db
  namespace: axonhub
spec:
  instances: 1

  postgresql:
    parameters:
      shared_buffers: "128MB"
      effective_cache_size: "256MB"
      max_connections: "100"

  storage:
    storageClass: local-path
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  monitoring:
    enablePodMonitor: true

  affinity:
    nodeSelector:
      node-role.kubernetes.io/worker: ""
