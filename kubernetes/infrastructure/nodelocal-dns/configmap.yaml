apiVersion: v1
kind: ConfigMap
metadata:
  name: nodelocal-dns
  namespace: kube-system
  labels:
    k8s-app: nodelocal-dns
data:
  Corefile: |
    cluster.local:53 {
        errors
        cache {
            success 9984 30
            denial 9984 5
        }
        bind 169.254.20.10
        forward . 10.96.0.10 {
            force_tcp
        }
        reload
    }

    in-addr.arpa:53 {
        errors
        cache 30
        bind 169.254.20.10
        forward . 10.96.0.10 {
            force_tcp
        }
    }

    ip6.arpa:53 {
        errors
        cache 30
        bind 169.254.20.10
        forward . 10.96.0.10 {
            force_tcp
        }
    }

    # Stub zones for cluster-owned domains → k8s-gateway returns internal gateway IPs
    # instead of Cloudflare IPs, keeping pod-to-pod traffic off the public internet
    whydontyou.work:53 {
        errors
        cache 30
        bind 169.254.20.10
        forward . 10.105.17.248
    }
    heygolem.com:53 {
        errors
        cache 30
        bind 169.254.20.10
        forward . 10.105.17.248
    }
    codecrucible.app:53 {
        errors
        cache 30
        bind 169.254.20.10
        forward . 10.105.17.248
    }

    .:53 {
        errors
        cache 30
        bind 169.254.20.10
        forward . 1.1.1.1 8.8.8.8
        reload
        health :8080
        prometheus :9153
    }
