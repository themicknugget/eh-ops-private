---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  namespace: forgejo-runners
spec:
  replicas: 10
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-runner-data
        - name: config
          configMap:
            name: forgejo-runner-config
        - name: docker-certs-client
          emptyDir: {}
        - name: docker-certs-ca
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
        - name: docker-sock
          emptyDir: {}
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:6.2.2
          command:
            - sh
            - -c
            - |
              set -e
              if [ -f /data/.runner ]; then
                echo "registration already present at /data/.runner — skipping"
                exit 0
              fi
              echo "registering runner with Forgejo at $FORGEJO_INSTANCE_URL"
              forgejo-runner register \
                --no-interactive \
                --instance "$FORGEJO_INSTANCE_URL" \
                --token "$FORGEJO_RUNNER_REGISTRATION_TOKEN" \
                --name "${RUNNER_NAME:-$HOSTNAME}" \
                --labels "ubuntu-latest:docker://catthehacker/ubuntu:act-22.04,ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04,ubuntu-20.04:docker://catthehacker/ubuntu:act-20.04,self-hosted"
              chown 1000:1000 /data/.runner || true
          env:
            - name: FORGEJO_INSTANCE_URL
              value: http://forgejo-http.forgejo.svc.cluster.local:3000
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-token
                  key: token
            - name: RUNNER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: data
              mountPath: /data
              subPathExpr: $(POD_NAME)
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.2.2
          command:
            - sh
            - -c
            - |
              echo waiting for docker.sock
              until [ -S /var/run/docker.sock ]; do sleep 1; done
              echo socket ready
              exec forgejo-runner --config /etc/forgejo-runner/config.yaml daemon
          workingDir: /data
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: data
              mountPath: /data
              subPathExpr: $(POD_NAME)
            - name: config
              mountPath: /etc/forgejo-runner
              readOnly: true
            - name: docker-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          args:
            - "--group"
            - "1000"
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
            - name: docker-sock
              mountPath: /var/run
            - name: config
              mountPath: /etc/docker/daemon.json
              subPath: daemon.json
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 4Gi
