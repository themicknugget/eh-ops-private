# Dedicated model cache for mini8-pinned models. The main model-cache PVC is
# local-path RWO bound to shadow, so cross-node models need their own volume.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-mini8
  namespace: inference
  labels:
    app.kubernetes.io/component: model-cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
