apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: qwen35-reap-212b-a17b
  namespace: inference
spec:
  modelName: qwen35-reap-212b-a17b
  backend: llamacpp-vulkan-moe-flash-cpumoe
  source:
    huggingFace:
      repo: OpenMOSE/Qwen3.5-REAP-212B-A17B-GGUF
      contextSize: "8192"
      modelFile: IQ4_XS/Qwen3.5-REAP-212B-A17B-IQ4_XS-00001-of-00004.gguf
      files:
        - IQ4_XS/*.gguf
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: qwen35-reap-212b-a17b
  resources:
    memory: 110Gi
    memoryLimit: 120Gi
  env:
  - name: LLAMA_FLASH_MOE_METRICS_PORT
    value: "9090"
  - name: LLAMA_FLASH_MOE_ENABLED
    value: "0"
  - name: LLAMA_FLASH_MOE_MODE
    value: "disabled"
  - name: LLAMA_FLASH_MOE_IOURING
    value: "0"
  # Test: force slot remapping to reduce GTT usage (108 GB → ~25 GB)
  # 267 experts, K=10, 64 slots = 24% cached
  - name: GGML_MOE_N_SLOTS
    value: "64"
  # Force CPU_MOE to enable slot remapping (override auto-detect)
  - name: LLAMA_FLASH_MOE_GTT_MB
    value: "1"
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
