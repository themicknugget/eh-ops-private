apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceBackend
metadata:
  name: vllm
  namespace: inference
spec:
  image:
    repository: docker.io/kyuz0/vllm-therock-gfx1151
    tag: latest
  port: 8000
  args:
    - --model
    - $(HF_SOURCE)
    - --host
    - 0.0.0.0
    - --port
    - "8000"
  readinessPath: /health
  gpu:
    shared: true
  env:
    - name: ROCBLAS_USE_HIPBLASLT
      value: "1"
  securityContext:
    capabilities:
      add:
        - SYS_PTRACE
    seccompProfile:
      type: Unconfined
  volumes:
    - name: dri
      hostPath:
        path: /dev/dri
    - name: kfd
      hostPath:
        path: /dev/kfd
  volumeMounts:
    - name: dri
      mountPath: /dev/dri
    - name: kfd
      mountPath: /dev/kfd
