apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: qwen2-5-7b
  namespace: inference
spec:
  modelName: qwen2-5-7b
  backend: llamacpp-vulkan
  source:
    huggingFace:
      repo: bartowski/Qwen2.5-7B-Instruct-GGUF
      contextSize: "65536"
      modelFile: Qwen2.5-7B-Instruct-Q4_K_M.gguf
      files:
        - "*Q4_K_M.gguf"
      tokenSecret: hf-token
  storage:
    pvc: model-cache
    modelDir: qwen2-5-7b
  resources:
    memory: 6Gi
    memoryLimit: 12Gi
  env:
    - name: LLAMA_ARG_CTX_SIZE
      value: "65536"
  scaling:
    cooldownPeriod: 5m
    maxReplicas: 1
    enabled: true
  nodeSelector:
    kubernetes.io/hostname: shadow
  tolerations:
    - key: amd.com/gpu
      operator: Exists
