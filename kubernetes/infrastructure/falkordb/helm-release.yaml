apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falkordb
  namespace: falkordb
spec:
  interval: 30m
  chart:
    spec:
      chart: redis
      version: "25.3.7"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: falkordb-auth
      valuesKey: password
      targetPath: auth.password
  values:
    global:
      security:
        allowInsecureImages: true

    image:
      registry: docker.io
      repository: falkordb/falkordb
      tag: v4.16.7

    auth:
      enabled: true
      existingSecret: falkordb-auth
      existingSecretPasswordKey: password

    # FalkorDB module + persistence tuning via redis.conf
    # Bitnami mounts commonConfiguration as redis.conf and passes it to redis-server
    commonConfiguration: |-
      loadmodule /var/lib/falkordb/bin/falkordb.so QUERY_MEM_CAPACITY 536870912 TIMEOUT_MAX 60000
      appendonly yes
      appendfsync everysec
      save 900 1 300 10
      maxmemory-policy noeviction
      timeout 0

    sentinel:
      enabled: true
      masterSet: falkordb-master
      quorum: 2

    replica:
      replicaCount: 3
      persistence:
        enabled: true
        size: 20Gi
        storageClass: local-path
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: falkordb
