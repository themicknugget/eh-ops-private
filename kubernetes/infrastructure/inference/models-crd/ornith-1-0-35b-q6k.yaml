apiVersion: inference.eh-ops.io/v1alpha1
kind: InferenceModel
metadata:
  name: ornith-1-0-35b-q6k
  namespace: inference
spec:
  modelName: ornith-1-0-35b-q6k
  backend: llamacpp-vulkan-moe
  source:
    huggingFace:
      repo: deepreinforce-ai/Ornith-1.0-35B-GGUF
      contextSize: "65536"
      modelFile: ornith-1.0-35b-Q6_K.gguf
