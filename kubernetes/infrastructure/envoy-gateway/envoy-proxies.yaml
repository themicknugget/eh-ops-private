---
# EnvoyProxy resources must be in kube-system (same namespace as the Gateways) because
# Gateway.spec.infrastructure.parametersRef is LocalParametersReference — no namespace field.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: external-gateway-proxy
  namespace: kube-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        annotations:
          io.cilium/lb-ipam-ips: "192.168.1.65"
